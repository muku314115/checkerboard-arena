<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Checkers</h1>

<div id="scorebar">
  <div class="player-indicator" id="p1-ind">
    <div class="chip-icon p1"></div>
    <span>Blue</span>
    <span class="cap-count" id="p1-caps">(0 cap.)</span>
    <div class="turn-dot"></div>
  </div>
  <span style="color:var(--border)">│</span>
  <div class="player-indicator inactive" id="p2-ind">
    <div class="chip-icon p2"></div>
    <span>Black</span>
    <span class="cap-count" id="p2-caps">(0 cap.)</span>
    <div class="turn-dot"></div>
  </div>
</div>

<div id="board-wrap">
  <div id="board" role="grid" aria-label="Checkers board"></div>
</div>

<div id="status">Select a piece to move</div>

<div id="controls">
  <button class="primary" onclick="newGame()">New Game</button>
  <button onclick="toggleHistory()">Move Log</button>
</div>

<div id="history-wrap">
  <div id="history"></div>
</div>

<!-- Win overlay -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <div style="font-size:3rem">🏆</div>
    <h2 id="modal-title"></h2>
    <p id="modal-sub"></p>
    <button class="primary" onclick="newGame()">Play Again</button>
  </div>
</div>

<a id="createos-badge" href="https://createos.sh/app" target="_blank" rel="noopener noreferrer">
  <img src="https://nodeops.network/SymbolBlack.svg" alt="" />
  Built with CreateOS
</a>

<script>
// ──────────────────────────────────────────────
//  CHECKERS ENGINE
// ──────────────────────────────────────────────

const EMPTY = 0, P1 = 1, P2 = 2, P1K = 3, P2K = 4;

let board = [], turn = P1, selected = null;
let validMoves = [], mustCapture = false;
let capturedP1 = 0, capturedP2 = 0;
let moveHistory = [];
let lastFrom = null, lastTo = null;
let histOpen = false;

function newGame() {
  board = Array.from({length: 8}, () => Array(8).fill(EMPTY));
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if ((r + c) % 2 === 1) {
        if (r < 3) board[r][c] = P2;
        else if (r > 4) board[r][c] = P1;
      }
    }
  }
  turn = P1;
  selected = null; validMoves = [];
  capturedP1 = 0; capturedP2 = 0;
  moveHistory = [];
  lastFrom = null; lastTo = null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('history').textContent = '';
  mustCapture = hasMandatoryCapture(turn);
  render();
  setStatus(mustCapture ? 'Capture available — you must take it!' : 'Select a piece to move');
}

// ── Move generation ────────────────────────────

function isP1(v) { return v === P1 || v === P1K; }
function isP2(v) { return v === P2 || v === P2K; }
function isKing(v) { return v === P1K || v === P2K; }
function isMine(v, player) { return player === P1 ? isP1(v) : isP2(v); }
function isEnemy(v, player) { return player === P1 ? isP2(v) : isP1(v); }
function inBounds(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8; }

function moveDirs(piece) {
  if (piece === P1) return [[-1,-1],[-1,1]];
  if (piece === P2) return [[1,-1],[1,1]];
  return [[-1,-1],[-1,1],[1,-1],[1,1]];
}

function getCaptures(r, c, brd, player) {
  const piece = brd[r][c];
  const dirs = moveDirs(piece);
  const caps = [];
  for (const [dr, dc] of dirs) {
    const mr = r + dr, mc = c + dc;
    const lr = r + dr*2, lc = c + dc*2;
    if (inBounds(lr, lc) && isEnemy(brd[mr][mc], player) && brd[lr][lc] === EMPTY) {
      caps.push({ to: [lr, lc], cap: [mr, mc] });
    }
  }
  return caps;
}

function getSimpleMoves(r, c, brd, player) {
  const piece = brd[r][c];
  const dirs = moveDirs(piece);
  const moves = [];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (inBounds(nr, nc) && brd[nr][nc] === EMPTY) {
      moves.push({ to: [nr, nc], cap: null });
    }
  }
  return moves;
}

function hasMandatoryCapture(player) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (isMine(board[r][c], player) && getCaptures(r, c, board, player).length) return true;
  return false;
}

function getValidMoves(r, c) {
  const piece = board[r][c];
  if (!isMine(piece, turn)) return [];
  const caps = getCaptures(r, c, board, turn);
  if (mustCapture && caps.length === 0) return [];
  return caps.length ? caps : getSimpleMoves(r, c, board, turn);
}

// ── Execute a move ─────────────────────────────

function promote(r, c) {
  if (board[r][c] === P1 && r === 0) board[r][c] = P1K;
  if (board[r][c] === P2 && r === 7) board[r][c] = P2K;
}

function colName(c) { return String.fromCharCode(65+c); }

function executeMove(fromR, fromC, toR, toC, capR, capC) {
  const piece = board[fromR][fromC];
  const notation = `${colName(fromC)}${8-fromR}→${colName(toC)}${8-toR}${capR!=null?'✕':''}`;
  board[toR][toC] = piece;
  board[fromR][fromC] = EMPTY;

  if (capR != null) {
    if (isP1(board[capR][capC])) capturedP2++;
    else capturedP1++;
    board[capR][capC] = EMPTY;
    promote(toR, toC);
    const further = getCaptures(toR, toC, board, turn);
    if (further.length > 0) {
      selected = [toR, toC];
      validMoves = further;
      lastFrom = [fromR, fromC]; lastTo = [toR, toC];
      moveHistory.push(notation);
      logMove(notation);
      render();
      setStatus('Capture chain — keep jumping!');
      return;
    }
  } else {
    promote(toR, toC);
  }

  lastFrom = [fromR, fromC]; lastTo = [toR, toC];
  moveHistory.push(notation);
  logMove(notation);
  selected = null; validMoves = [];

  turn = turn === P1 ? P2 : P1;
  mustCapture = hasMandatoryCapture(turn);
  render();

  if (checkWin()) return;
  setStatus(mustCapture ? 'Capture available — you must take it!' : `${turn===P1?'Blue':'Black'}'s turn`);
}

function checkWin() {
  let p1alive = 0, p2alive = 0;
  for (let r=0;r<8;r++) for(let c=0;c<8;c++) {
    if (isP1(board[r][c])) p1alive++;
    if (isP2(board[r][c])) p2alive++;
  }
  let hasMoves = false;
  outer: for (let r=0;r<8;r++) for(let c=0;c<8;c++) {
    if (isMine(board[r][c], turn)) {
      if (getCaptures(r,c,board,turn).length || getSimpleMoves(r,c,board,turn).length) {
        hasMoves = true; break outer;
      }
    }
  }
  if (p1alive === 0 || (!hasMoves && turn === P1)) { showWin('Black'); return true; }
  if (p2alive === 0 || (!hasMoves && turn === P2)) { showWin('Blue'); return true; }
  return false;
}

function showWin(winner) {
  document.getElementById('modal-title').textContent = `${winner} Wins!`;
  document.getElementById('modal-sub').textContent = `Captured: Blue ${capturedP1} | Black ${capturedP2} — ${moveHistory.length} moves played`;
  document.getElementById('overlay').classList.add('show');
}

// ── Interaction ────────────────────────────────

function handleCell(r, c) {
  const piece = board[r][c];

  if (selected) {
    const mv = validMoves.find(m => m.to[0]===r && m.to[1]===c);
    if (mv) {
      const [fr,fc] = selected;
      executeMove(fr, fc, r, c, mv.cap ? mv.cap[0] : null, mv.cap ? mv.cap[1] : null);
      return;
    }
  }

  if (isMine(piece, turn)) {
    const moves = getValidMoves(r, c);
    if (moves.length === 0 && mustCapture) {
      setStatus('You must make a capture this turn!');
      return;
    }
    selected = [r, c];
    validMoves = moves;
    render();
    if (moves.length === 0) setStatus('No moves available for this piece');
    return;
  }

  selected = null; validMoves = [];
  render();
}

// ── Render ─────────────────────────────────────

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  const moveSet = new Set(validMoves.map(m => m.to[0]*8+m.to[1]));
  const captureSet = new Set(validMoves.filter(m=>m.cap).map(m => m.to[0]*8+m.to[1]));

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((r+c)%2===0 ? 'light' : 'dark');
      cell.setAttribute('role', 'gridcell');

      if (selected && selected[0]===r && selected[1]===c) cell.classList.add('selected');
      if (lastFrom && lastFrom[0]===r && lastFrom[1]===c) cell.classList.add('last-from');
      if (lastTo && lastTo[0]===r && lastTo[1]===c) cell.classList.add('last-to');

      const key = r*8+c;
      if (moveSet.has(key)) {
        cell.classList.add('move-target');
        if (captureSet.has(key)) cell.classList.add('capture-target');
      }

      const piece = board[r][c];
      if (piece !== EMPTY) {
        const el = document.createElement('div');
        el.className = 'piece ' + (isP1(piece) ? 'p1' : 'p2') + (isKing(piece) ? ' king' : '');
        if (selected && selected[0]===r && selected[1]===c) el.classList.add('selected-piece');
        el.setAttribute('aria-label', `${isP1(piece)?'Blue':'Black'}${isKing(piece)?' king':''} at ${colName(c)}${8-r}`);
        cell.appendChild(el);
      }

      cell.addEventListener('click', () => handleCell(r, c));
      boardEl.appendChild(cell);
    }
  }

  const p1ind = document.getElementById('p1-ind');
  const p2ind = document.getElementById('p2-ind');
  p1ind.classList.toggle('inactive', turn !== P1);
  p2ind.classList.toggle('inactive', turn !== P2);
  document.getElementById('p1-caps').textContent = `(${capturedP2} cap.)`;
  document.getElementById('p2-caps').textContent = `(${capturedP1} cap.)`;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function logMove(notation) {
  const el = document.getElementById('history');
  const n = moveHistory.length;
  const entry = n % 2 === 1 ? `${Math.ceil(n/2)}. ${notation} ` : `${notation}\n`;
  el.textContent += entry;
  el.scrollTop = el.scrollHeight;
}

function toggleHistory() {
  histOpen = !histOpen;
  document.getElementById('history-wrap').classList.toggle('open', histOpen);
}

// ── Boot ──────────────────────────────────────
newGame();
</script>

</body>
</html>
